  <!-- Поворачиваем всё на 90°, чтобы локальная ось X (направление анимации) стала вертикальной вверх -->
  <g transform="rotate(90)">
    <!-- Синий фон -->
    <rect x="14" y="-136" width="372" height="72" fill="#1ec1f4" stroke-width="0" />
    <!-- Прямоугольник с паттерном пузырьков, анимированный на смещение по X (вертикаль) -->
    <rect x="14" y="-136" width="372" height="72" fill="url(#liquid)" stroke-width="0" class="bubble-up" />
  </g>

  <style>
    .bubble-up {
      /* Явно задаём начало координат для трансформации — левый верхний угол прямоугольника */
      transform-origin: 0 0;
      animation: moveBubbles 2s linear infinite;
    }
    @keyframes moveBubbles {
      0% { transform: translateX(0); }
      /* Сдвиг на ширину паттерна (172px) — после поворота это смещение вверх */
      100% { transform: translateX(172px); }
    }
  </style>
